name: Build and Push Docker Images (Test)

# Security note: same pinning recommendation as docker-build-push.yml.
# Triggered manually from any branch; builds linux/amd64 only and pushes
# images tagged ":test".

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: tiritibambix/itransfer-backend
  IMAGE_FRONTEND: tiritibambix/itransfer-frontend

jobs:
  audit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check dependencies with pip-audit
        run: |
          docker run --rm -v $(pwd):/app -w /app python:3.10-slim sh -c " \
          python -m venv venv && \
          . venv/bin/activate && \
          pip install --upgrade pip setuptools && \
          pip install pip-audit && \
          pip-audit"

  build-push-backend:
    runs-on: ubuntu-24.04
    needs: audit
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image (amd64, :test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-push-frontend:
    runs-on: ubuntu-24.04
    needs: audit
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image (amd64, :test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

name: Build and Push Multi-Arch Docker Images

# Security note: third-party actions are pinned by tag (the repo's historical
# convention). CodeQL's actions/unpinned-tag rule will still flag them. To
# silence it, replace each tag with a 40-char commit SHA and keep the tag as
# a trailing comment:
#   uses: docker/build-push-action@<sha>  # v7
# Resolve with: gh api repos/<owner>/<repo>/commits/<tag> --jq .sha

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
      - 'TODO.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
      - 'TODO.md'
  workflow_dispatch:

# Least-privilege default at the workflow scope. Each job also sets its own
# permissions block so CodeQL sees an explicit declaration per job.
permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: tiritibambix/itransfer-backend
  IMAGE_FRONTEND: tiritibambix/itransfer-frontend

jobs:
  setup:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from Git
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  audit:
    runs-on: ubuntu-24.04
    needs: setup
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check dependencies with pip-audit
        run: |
          docker run --rm -v $(pwd):/app -w /app python:3.10-slim sh -c " \
          python -m venv venv && \
          . venv/bin/activate && \
          pip install --upgrade pip setuptools && \
          pip install pip-audit && \
          pip-audit"

  build-push-backend:
    runs-on: ubuntu-24.04
    needs: [setup, audit]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ needs.setup.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-push-frontend:
    runs-on: ubuntu-24.04
    needs: [setup, audit]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ needs.setup.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  update-dockerhub-description:
    runs-on: ubuntu-24.04
    needs: [build-push-backend, build-push-frontend]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Backend Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_BACKEND }}
          readme-filepath: ./README.md

      - name: Update Frontend Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_FRONTEND }}
          readme-filepath: ./README.md

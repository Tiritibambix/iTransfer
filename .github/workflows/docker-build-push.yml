name: Build and Push Multi-Arch Docker Images

# Security note: third-party actions are pinned by tag (the repo's historical
# convention). CodeQL's actions/unpinned-tag rule will still flag them. To
# silence it, replace each tag with a 40-char commit SHA and keep the tag as
# a trailing comment:
#   uses: docker/build-push-action@<sha>  # v7
# Resolve with: gh api repos/<owner>/<repo>/commits/<tag> --jq .sha

on:
  push:
    # No branches filter: every branch gets built and pushed, each tagged
    # with its own branch name (see the metadata steps below) so branch
    # builds never collide with each other or overwrite :latest, which
    # stays reserved for the default branch.
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
      - 'TODO.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
      - 'TODO.md'
  workflow_dispatch:

# Least-privilege default at the workflow scope. Each job also sets its own
# permissions block so CodeQL sees an explicit declaration per job.
permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: tiritibambix/itransfer-backend
  IMAGE_FRONTEND: tiritibambix/itransfer-frontend

jobs:
  setup:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      backend_tags: ${{ steps.meta_backend.outputs.tags }}
      backend_labels: ${{ steps.meta_backend.outputs.labels }}
      frontend_tags: ${{ steps.meta_frontend.outputs.tags }}
      frontend_labels: ${{ steps.meta_frontend.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # :latest only on the default branch; every branch also gets a tag
      # named after itself (slashes/uppercase normalized by the action) plus
      # a short-SHA tag for traceability back to the exact commit.
      - name: Extract Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Extract Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

  audit:
    runs-on: ubuntu-24.04
    needs: setup
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check dependencies with pip-audit
        run: |
          docker run --rm -v $(pwd):/app -w /app python:3.10-slim sh -c " \
          python -m venv venv && \
          . venv/bin/activate && \
          pip install --upgrade pip setuptools && \
          pip install pip-audit && \
          pip-audit"

  build-push-backend:
    runs-on: ubuntu-24.04
    needs: [setup, audit]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ needs.setup.outputs.backend_tags }}
          labels: ${{ needs.setup.outputs.backend_labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-push-frontend:
    runs-on: ubuntu-24.04
    needs: [setup, audit]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ needs.setup.outputs.frontend_tags }}
          labels: ${{ needs.setup.outputs.frontend_labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  update-dockerhub-description:
    runs-on: ubuntu-24.04
    needs: [build-push-backend, build-push-frontend]
    # Only the default branch should own the public Docker Hub description --
    # branch builds push their own image tags but must not overwrite it.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update Backend Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_BACKEND }}
          readme-filepath: ./README.md

      - name: Update Frontend Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_FRONTEND }}
          readme-filepath: ./README.md
